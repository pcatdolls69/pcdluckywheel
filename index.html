<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸运转盘 / Lucky Wheel</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
  :root {
    --soft-pink: #ffe6f9;
    --soft-purple: #f3c8f0;
    --pink-text: #5a0060;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    color: #333;
    font-family: "Noto Sans SC", Arial, sans-serif;
    background: #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h2 {
    margin: 18px 0 8px;
    color: #fff;
  }

  #wheel-container {
    position: relative;
    width: 420px;
    height: 420px;
    overflow: visible;
    margin-top: 6px;
  }

  canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #fff;
    box-shadow:
      0 0 30px rgba(255,255,255,.85),
      0 0 60px rgba(255,200,255,.6);
  }

  #centerPointer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
  }

  #centerPointer polygon { fill: #000; }

  #spinBtn,
  .cta button {
    background: var(--soft-pink);
    border: 2px solid var(--soft-purple);
    border-radius: 16px;
    color: var(--pink-text);
    font-weight: 700;
    box-shadow: 0 3px 6px rgba(0,0,0,.15);
    cursor: pointer;
  }

  #spinBtn {
    margin-top: 8px;
    padding: 12px 28px;
    font-size: 18px;
    position: relative;
    top: -18px;
  }

  #spinBtn:active { transform: scale(.98); }

  #spinBtn:disabled,
  .cta button:disabled {
    opacity: .5;
    cursor: not-allowed;
  }

  #status {
    margin-top: 0;
    font-size: 14px;
    color: #fff;
    position: relative;
    top: -14px;
  }

  #cooldown {
    margin-top: 4px;
    font-size: 13px;
    color: #cfc7ff;
    position: relative;
    top: -10px;
    text-align: center;
    min-height: 20px;
  }

  .cta {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    justify-content: center;
    position: relative;
    top: -14px;
  }

  .cta button { padding: 10px 16px; }

  #footer {
    margin: 6px 10px 18px;
    text-align: center;
    font-size: 13px;
    color: #fff;
    line-height: 1.7;
  }

  #footer a {
    color: #fff;
    font-weight: 700;
    text-decoration: none;
  }

  @media (max-width: 460px) {
    #wheel-container {
      width: 94vw;
      height: 94vw;
      max-width: 420px;
      max-height: 420px;
    }

    .cta { flex-wrap: wrap; }
  }
</style>
</head>

<body>

<h2>幸运转盘 / Lucky Wheel</h2>

<div id="wheel-container">
  <canvas id="wheel" width="420" height="420"></canvas>

  <svg id="centerPointer" viewBox="0 0 420 420" aria-hidden="true">
    <polygon points="209,225 211,225 210,170"></polygon>
  </svg>
</div>

<button id="spinBtn" disabled>读取中 / Loading...</button>

<div id="status">
  剩余次数 / Chances:
  <span id="chances">0</span>
</div>

<div id="cooldown">读取中 / Loading...</div>

<div class="cta">
  <button id="subBtn" disabled>🔗 订阅 / Subscribe（+1）</button>
  <button id="shareBtn" disabled>🔗 分享 / Share（+1）</button>
</div>

<div id="footer">
  ⚠️ 所有奖项不能重叠使用 / All prizes cannot be combined
  <br><br>

  ‼️ 不適用於有 VIP 圖示的女生 /
  Not valid for girls with the VIP badge
  <br>

  ‼️ 優惠必須於一週內使用完成 /
  Prize must be redeemed within 7 days
  <br>

  <a href="https://t.me/pcatdolls" target="_blank" rel="noopener">
    pcatdolls 频道 / Channel
  </a>
</div>

<script>
"use strict";

const tg = window.Telegram?.WebApp || null;
const isTG = Boolean(tg);

if (isTG) {
  try {
    tg.ready();
    tg.expand();
  } catch (error) {
    console.error("Telegram WebApp initialization failed:", error);
  }
}

/* =========================
   转盘内容
========================= */

const prizes = [
  "⏰45-60/10 OFF",
  "Sorry 😢",
  "⏰45-60/20 OFF",
  "Sorry 😢",
  "⏰45-60/40 OFF",
  "Sorry 😢",
  "⏰45-60/10 OFF",
  "Sorry 😢"
];

const colors = [
  "#ffd1e8",
  "#cbb2fe",
  "#ffe07a",
  "#cbb2fe",
  "#ff7ebe",
  "#cbb2fe",
  "#ffd1e8",
  "#cbb2fe"
];

/* =========================
   次数规则与储存
   每 30 天恢复 2 次免费机会
========================= */

const FREE_SPINS_PER_PERIOD = 2;
const COOLDOWN_MS = 30 * 24 * 60 * 60 * 1000;
const CLOUD_TIMEOUT_MS = 2500;

const CLOUD_KEY = "pcdLuckyWheelStateV6";
const LOCAL_KEY = "pcdLuckyWheelStateV6Backup";

const defaultState = {
  periodStartedAt: 0,
  freeSpinsRemaining: FREE_SPINS_PER_PERIOD,
  bonusSpins: 0,
  subscribedBonusUsed: false,
  sharedBonusUsed: false
};

let state = { ...defaultState };
let spinning = false;
let stateLoaded = false;
let saving = false;

const chancesEl = document.getElementById("chances");
const spinBtn = document.getElementById("spinBtn");
const cooldownEl = document.getElementById("cooldown");
const subBtn = document.getElementById("subBtn");
const shareBtn = document.getElementById("shareBtn");
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

/* =========================
   状态整理
========================= */

function normalizeState(value) {
  const source = value && typeof value === "object" ? value : {};

  return {
    periodStartedAt: Math.max(0, Number(source.periodStartedAt) || 0),
    freeSpinsRemaining: Math.min(
      FREE_SPINS_PER_PERIOD,
      Math.max(
        0,
        Number.isFinite(Number(source.freeSpinsRemaining))
          ? Number(source.freeSpinsRemaining)
          : FREE_SPINS_PER_PERIOD
      )
    ),
    bonusSpins: Math.max(0, Number(source.bonusSpins) || 0),
    subscribedBonusUsed: Boolean(source.subscribedBonusUsed),
    sharedBonusUsed: Boolean(source.sharedBonusUsed)
  };
}

function refreshPeriodIfNeeded() {
  const now = Date.now();

  if (
    state.periodStartedAt === 0 ||
    now - state.periodStartedAt >= COOLDOWN_MS
  ) {
    state.periodStartedAt = now;
    state.freeSpinsRemaining = FREE_SPINS_PER_PERIOD;
    return true;
  }

  return false;
}

/* =========================
   本机储存
========================= */

function readLocalBackup() {
  try {
    const raw = localStorage.getItem(LOCAL_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (error) {
    console.error("Local backup read failed:", error);
    return null;
  }
}

function writeLocalBackup(value) {
  try {
    localStorage.setItem(LOCAL_KEY, JSON.stringify(value));
    return true;
  } catch (error) {
    console.error("Local backup write failed:", error);
    return false;
  }
}

/* =========================
   Telegram CloudStorage
   加入 timeout，避免永远卡在 Loading
========================= */

function withTimeout(promise, timeoutMs, fallbackValue) {
  return Promise.race([
    promise,
    new Promise((resolve) => {
      setTimeout(() => resolve(fallbackValue), timeoutMs);
    })
  ]);
}

function cloudGetItem(key) {
  return new Promise((resolve) => {
    if (!isTG || !tg.CloudStorage) {
      resolve(null);
      return;
    }

    try {
      tg.CloudStorage.getItem(key, (error, value) => {
        if (error) {
          console.error("CloudStorage getItem failed:", error);
          resolve(null);
          return;
        }

        resolve(value || null);
      });
    } catch (error) {
      console.error("CloudStorage getItem exception:", error);
      resolve(null);
    }
  });
}

function cloudSetItem(key, value) {
  return new Promise((resolve) => {
    if (!isTG || !tg.CloudStorage) {
      resolve(false);
      return;
    }

    try {
      tg.CloudStorage.setItem(key, value, (error) => {
        if (error) {
          console.error("CloudStorage setItem failed:", error);
          resolve(false);
          return;
        }

        resolve(true);
      });
    } catch (error) {
      console.error("CloudStorage setItem exception:", error);
      resolve(false);
    }
  });
}

async function loadState() {
  /*
    先读本机，保证按钮不会因为 Telegram 云端无响应而永久锁住。
  */
  const localValue = readLocalBackup();

  if (localValue) {
    state = normalizeState(localValue);
  } else {
    state = normalizeState(defaultState);
  }

  refreshPeriodIfNeeded();
  stateLoaded = true;
  writeLocalBackup(state);
  updateUI();

  /*
    再尝试云端同步；最多等待 2.5 秒。
  */
  try {
    const cloudRaw = await withTimeout(
      cloudGetItem(CLOUD_KEY),
      CLOUD_TIMEOUT_MS,
      null
    );

    if (cloudRaw) {
      const cloudValue = normalizeState(JSON.parse(cloudRaw));

      /*
        以较严格的状态为准，避免重新开启后恢复已用次数。
      */
      state = {
        periodStartedAt: Math.max(
          state.periodStartedAt,
          cloudValue.periodStartedAt
        ),
        freeSpinsRemaining: Math.min(
          state.freeSpinsRemaining,
          cloudValue.freeSpinsRemaining
        ),
        bonusSpins: Math.min(
          state.bonusSpins,
          cloudValue.bonusSpins
        ),
        subscribedBonusUsed:
          state.subscribedBonusUsed ||
          cloudValue.subscribedBonusUsed,
        sharedBonusUsed:
          state.sharedBonusUsed ||
          cloudValue.sharedBonusUsed
      };

      refreshPeriodIfNeeded();
      writeLocalBackup(state);
      updateUI();
    }
  } catch (error) {
    console.error("Cloud state load failed:", error);
  }
}

async function saveState() {
  saving = true;
  updateUI();

  const cleanState = normalizeState(state);
  state = cleanState;

  const localSaved = writeLocalBackup(cleanState);

  /*
    本机储存成功就继续转盘。
    云端失败不再让按钮卡死或还原成不能转。
  */
  if (isTG && tg.CloudStorage) {
    await withTimeout(
      cloudSetItem(CLOUD_KEY, JSON.stringify(cleanState)),
      CLOUD_TIMEOUT_MS,
      false
    );
  }

  saving = false;
  updateUI();

  if (!localSaved) {
    throw new Error("Local storage failed.");
  }
}

/* =========================
   次数与倒数
========================= */

function totalChances() {
  return state.freeSpinsRemaining + state.bonusSpins;
}

function fmtDuration(ms) {
  const seconds = Math.max(0, Math.floor(ms / 1000));
  const days = Math.floor(seconds / 86400);
  const hours = Math.floor((seconds % 86400) / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);
  const secs = seconds % 60;
  const pad = (number) => String(number).padStart(2, "0");

  return (
    (days > 0 ? days + "d " : "") +
    pad(hours) + ":" +
    pad(minutes) + ":" +
    pad(secs)
  );
}

function updateUI() {
  if (stateLoaded && refreshPeriodIfNeeded()) {
    writeLocalBackup(state);
  }

  chancesEl.textContent = stateLoaded ? String(totalChances()) : "0";

  if (!stateLoaded) {
    spinBtn.disabled = true;
    spinBtn.textContent = "读取中 / Loading...";
    cooldownEl.hidden = false;
    cooldownEl.textContent = "读取中 / Loading...";
    subBtn.disabled = true;
    shareBtn.disabled = true;
    return;
  }

  spinBtn.disabled =
    spinning ||
    saving ||
    totalChances() <= 0;

  if (spinning) {
    spinBtn.textContent = "抽奖中 / Spinning...";
  } else if (saving) {
    spinBtn.textContent = "储存中 / Saving...";
  } else if (totalChances() <= 0) {
    spinBtn.textContent = "暂无次数 / No chances";
  } else {
    spinBtn.textContent = "开始抽奖 / Start";
  }

  subBtn.disabled = saving || state.subscribedBonusUsed;
  shareBtn.disabled = saving || state.sharedBonusUsed;

  subBtn.textContent = state.subscribedBonusUsed
    ? "✅ 已领取 / Claimed"
    : "🔗 订阅 / Subscribe（+1）";

  shareBtn.textContent = state.sharedBonusUsed
    ? "✅ 已领取 / Claimed"
    : "🔗 分享 / Share（+1）";

  if (state.freeSpinsRemaining <= 0) {
    const remainMs =
      COOLDOWN_MS -
      (Date.now() - state.periodStartedAt);

    cooldownEl.hidden = false;
    cooldownEl.textContent =
      "下次免费次数恢复 / Free spins reset in: " +
      fmtDuration(remainMs);
  } else {
    cooldownEl.hidden = true;
    cooldownEl.textContent = "";
  }
}

setInterval(updateUI, 1000);

/* =========================
   绘制转盘
========================= */

function drawWheel(angleOffset = 0) {
  const cx = 210;
  const cy = 210;
  const radius = 200;
  const numberOfPrizes = prizes.length;
  const arc = (2 * Math.PI) / numberOfPrizes;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < numberOfPrizes; i++) {
    const start = i * arc + angleOffset;
    const end = start + arc;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, start, end);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#000";

    const text = prizes[i];
    const maxWidth = Math.min(120, radius * arc * 0.7);
    const textRadius = radius - 48;
    let fontSize = 18;

    ctx.font = `bold ${fontSize}px Arial, "Noto Sans SC", sans-serif`;

    while (ctx.measureText(text).width > maxWidth && fontSize > 12) {
      fontSize--;
      ctx.font = `bold ${fontSize}px Arial, "Noto Sans SC", sans-serif`;
    }

    ctx.fillText(text, textRadius, 0);
    ctx.restore();
  }
}

drawWheel();

/* =========================
   抽奖
========================= */

spinBtn.addEventListener("click", async () => {
  if (!stateLoaded || spinning || saving) return;

  refreshPeriodIfNeeded();

  if (totalChances() <= 0) {
    showMessage("目前没有抽奖次数。\nNo chances available.");
    return;
  }

  spinning = true;

  /*
    记录本次扣的是哪一种次数，储存失败时可正确还原。
  */
  let consumedType = "";

  if (state.bonusSpins > 0) {
    state.bonusSpins--;
    consumedType = "bonus";
  } else {
    state.freeSpinsRemaining--;
    consumedType = "free";
  }

  updateUI();

  try {
    await saveState();
  } catch (error) {
    if (consumedType === "bonus") {
      state.bonusSpins++;
    } else if (consumedType === "free") {
      state.freeSpinsRemaining = Math.min(
        FREE_SPINS_PER_PERIOD,
        state.freeSpinsRemaining + 1
      );
    }

    spinning = false;
    writeLocalBackup(state);
    updateUI();

    showMessage(
      "抽奖资料储存失败，请重新开启后再试。\nStorage failed. Please try again."
    );
    return;
  }

  const spinAngle = 360 * 5 + Math.random() * 360;
  const duration = 4200;
  const startTime = performance.now();

  function step(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);

    drawWheel(ease * spinAngle * Math.PI / 180);

    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      spinning = false;
      updateUI();
      onDone(spinAngle);
    }
  }

  requestAnimationFrame(step);
});

function onDone(spinAngleDeg) {
  const count = prizes.length;
  const arcDeg = 360 / count;

  /*
    指针位于正上方（-90°），计算最终落点。
  */
  const normalized = ((-90 - spinAngleDeg) % 360 + 360) % 360;
  const index = Math.floor(normalized / arcDeg) % count;
  const result = prizes[index];

  reportResult(result);
}

/* =========================
   传送结果到 Render Bot
========================= */

async function reportResult(result) {
  if (!tg || !tg.initData) {
    console.error("Telegram Mini App initData is unavailable.");
    showMessage(
      "抽奖完成，请截图保存结果。\nSpin completed. Please take a screenshot."
    );
    return;
  }

  try {
    const response = await fetch(
      "https://pcatdolls-auto-channel-bot.onrender.com/wheel-result",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          initData: tg.initData,
          result
        })
      }
    );

    const responseText = await response.text();
    let responseData;

    try {
      responseData = JSON.parse(responseText);
    } catch (error) {
      throw new Error("Render returned an invalid response.");
    }

    if (!response.ok || !responseData.ok) {
      throw new Error(responseData.error || "Result sending failed.");
    }

    console.log("Wheel result sent successfully:", result);

    setTimeout(() => {
      try {
        tg.close();
      } catch (error) {
        console.error("Telegram close failed:", error);
      }
    }, 700);
  } catch (error) {
    console.error("Wheel result sending failed:", error);

    showMessage(
      "抽奖结果传送失败，请截图保存结果。\nResult sending failed. Please take a screenshot."
    );
  }
}

/* =========================
   订阅奖励：每个帐号只能领取一次
========================= */

subBtn.addEventListener("click", async () => {
  if (!stateLoaded || saving) return;

  if (state.subscribedBonusUsed) {
    showMessage(
      "订阅奖励已经领取过。\nSubscribe bonus already claimed."
    );
    return;
  }

  if (isTG) {
    try {
      tg.openTelegramLink("https://t.me/pcatdolls");
    } catch (error) {
      console.error("Telegram link open failed:", error);
    }
  } else {
    window.open("https://t.me/pcatdolls", "_blank", "noopener");
  }

  state.subscribedBonusUsed = true;
  state.bonusSpins++;
  updateUI();

  try {
    await saveState();
    showMessage("已增加一次抽奖机会！\nOne chance added!");
  } catch (error) {
    state.subscribedBonusUsed = false;
    state.bonusSpins = Math.max(0, state.bonusSpins - 1);
    writeLocalBackup(state);
    updateUI();

    showMessage(
      "奖励储存失败，请稍后再试。\nBonus storage failed."
    );
  }
});

/* =========================
   分享奖励：每个帐号只能领取一次
========================= */

shareBtn.addEventListener("click", async () => {
  if (!stateLoaded || saving) return;

  if (state.sharedBonusUsed) {
    showMessage(
      "分享奖励已经领取过。\nShare bonus already claimed."
    );
    return;
  }

  const shareUrl =
    "https://t.me/share/url" +
    "?url=" +
    encodeURIComponent("https://t.me/pcatdolls") +
    "&text=" +
    encodeURIComponent("PCD Lucky Wheel");

  if (isTG) {
    try {
      tg.openTelegramLink(shareUrl);
    } catch (error) {
      console.error("Telegram share link failed:", error);
    }
  } else {
    window.open(shareUrl, "_blank", "noopener");
  }

  state.sharedBonusUsed = true;
  state.bonusSpins++;
  updateUI();

  try {
    await saveState();
    showMessage("已增加一次抽奖机会！\nOne chance added!");
  } catch (error) {
    state.sharedBonusUsed = false;
    state.bonusSpins = Math.max(0, state.bonusSpins - 1);
    writeLocalBackup(state);
    updateUI();

    showMessage(
      "奖励储存失败，请稍后再试。\nBonus storage failed."
    );
  }
});

function showMessage(message) {
  if (isTG && typeof tg.showAlert === "function") {
    try {
      tg.showAlert(message);
      return;
    } catch (error) {
      console.error("Telegram alert failed:", error);
    }
  }

  alert(message);
}

/* 初始化 */
loadState();
</script>

</body>
</html>
