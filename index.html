<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>幸运转盘 / Lucky Wheel</title>

<style>
  :root {
    --soft-pink: #ffe6f9;
    --soft-purple: #f3c8f0;
    --pink-text: #5a0060;
  }

  body {
    margin: 0;
    color: #333;
    font-family: 'Noto Sans SC', Arial, sans-serif;
    background: #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h2 {
    margin: 18px 0 8px;
    color: #fff;
  }

  #wheel-container {
    position: relative;
    width: 420px;
    height: 420px;
    overflow: visible;
    margin-top: 6px;
  }

  canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #fff;
    box-shadow:
      0 0 30px rgba(255,255,255,.85),
      0 0 60px rgba(255,200,255,.6);
  }

  #centerPointer {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
  }

  #centerPointer polygon {
    fill: #000;
  }

  #spinBtn,
  .cta button {
    background: var(--soft-pink);
    border: 2px solid var(--soft-purple);
    border-radius: 16px;
    color: var(--pink-text);
    font-weight: 700;
    box-shadow: 0 3px 6px rgba(0,0,0,0.15);
    cursor: pointer;
  }

  #spinBtn {
    margin-top: 8px;
    padding: 12px 28px;
    font-size: 18px;
    position: relative;
    top: -18px;
  }

  #spinBtn:active {
    transform: scale(.98);
  }

  #spinBtn:disabled {
    opacity: .5;
    cursor: not-allowed;
  }

  #status {
    margin-top: 0;
    font-size: 14px;
    color: #fff;
    position: relative;
    top: -14px;
  }

  #cooldown {
    margin-top: 4px;
    font-size: 13px;
    color: #cfc7ff;
    position: relative;
    top: -10px;
    text-align: center;
  }

  .cta {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    justify-content: center;
    position: relative;
    top: -14px;
  }

  .cta button {
    padding: 10px 16px;
  }

  #footer {
    margin: 6px 10px 18px;
    text-align: center;
    font-size: 13px;
    color: #fff;
    line-height: 1.7;
  }

  #footer a {
    color: #fff;
    font-weight: 700;
    text-decoration: none;
  }

  @media (max-width: 460px) {
    #wheel-container {
      width: 94vw;
      height: 94vw;
      max-width: 420px;
      max-height: 420px;
    }

    .cta {
      flex-wrap: wrap;
    }
  }
</style>
</head>

<body>

<h2>幸运转盘 / Lucky Wheel</h2>

<div id="wheel-container">
  <canvas id="wheel" width="420" height="420"></canvas>

  <svg id="centerPointer" viewBox="0 0 420 420" aria-hidden="true">
    <polygon points="209,225 211,225 210,170"></polygon>
  </svg>
</div>

<button id="spinBtn">开始抽奖 / Start</button>

<div id="status">
  剩余次数 / Chances:
  <span id="chances">0</span>
</div>

<div id="cooldown" hidden></div>

<div class="cta">
  <button id="subBtn">🔗 订阅 / Subscribe（+1）</button>
  <button id="shareBtn">🔗 分享 / Share（+1）</button>
</div>

<div id="footer">
  ⚠️ 所有奖项不能重叠使用 / All prizes cannot be combined
  <br><br>

  ‼️ 不適用於有 VIP 圖示的女生 /
  Not valid for girls with the VIP badge
  <br>

  ‼️ 優惠必須於一週內使用完成 /
  Prize must be redeemed within 7 days
  <br>

  <a href="https://t.me/pcatdolls" target="_blank">
    pcatdolls 频道 / Channel
  </a>
</div>

<script>
const isTG = Boolean(
  window.Telegram &&
  window.Telegram.WebApp
);

if (isTG) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

const prizes = [
  "⏰45-60/10 OFF",
  "Sorry 😢",
  "⏰45-60/20 OFF",
  "Sorry 😢",
  "⏰45-60/40 OFF",
  "Sorry 😢",
  "⏰45-60/10 OFF",
  "Sorry 😢"
];

const colors = [
  "#ffd1e8",
  "#cbb2fe",
  "#ffe07a",
  "#cbb2fe",
  "#ff7ebe",
  "#cbb2fe",
  "#ffd1e8",
  "#cbb2fe",
];

/* 30天一次免费抽奖 */
const FOURTEEN_DAYS =
 10 * 1000;

const LS_LAST = "pcdLastSpinAt";
const LS_BONUS = "pcdBonusSpins";

let lastSpinAt = parseInt(
  localStorage.getItem(LS_LAST) || "0",
  10
);

let bonusSpins = parseInt(
  localStorage.getItem(LS_BONUS) || "0",
  10
);

let spinning = false;

const chancesEl =
  document.getElementById("chances");

const spinBtn =
  document.getElementById("spinBtn");

const cooldownEl =
  document.getElementById("cooldown");

const canvas =
  document.getElementById("wheel");

const ctx =
  canvas.getContext("2d");

function baseSpinAvailable() {
  return (
    Date.now() - lastSpinAt >=
    FOURTEEN_DAYS
  );
}

function totalChances() {
  return (
    (baseSpinAvailable() ? 1 : 0) +
    bonusSpins
  );
}

function saveState() {
  localStorage.setItem(
    LS_LAST,
    String(lastSpinAt)
  );

  localStorage.setItem(
    LS_BONUS,
    String(bonusSpins)
  );
}

function fmtDuration(ms) {
  const seconds = Math.max(
    0,
    Math.floor(ms / 1000)
  );

  const days =
    Math.floor(seconds / 86400);

  const hours =
    Math.floor(
      (seconds % 86400) / 3600
    );

  const minutes =
    Math.floor(
      (seconds % 3600) / 60
    );

  const secs =
    seconds % 60;

  const pad = number =>
    String(number).padStart(2, "0");

  return (
    (days > 0 ? days + "d " : "") +
    pad(hours) +
    ":" +
    pad(minutes) +
    ":" +
    pad(secs)
  );
}

function updateUI() {
  chancesEl.textContent =
    String(totalChances());

  spinBtn.disabled =
    spinning ||
    totalChances() <= 0;

  if (!baseSpinAvailable()) {
    const remainMs =
      FOURTEEN_DAYS -
      (Date.now() - lastSpinAt);

    cooldownEl.hidden = false;

    cooldownEl.textContent =
      "下次免费转盘倒计时 / Next free spin in: " +
      fmtDuration(remainMs);
  } else {
    cooldownEl.hidden = true;
  }
}

setInterval(updateUI, 1000);
updateUI();

function drawWheel(angleOffset = 0) {
  const cx = 210;
  const cy = 210;
  const radius = 200;

  const numberOfPrizes =
    prizes.length;

  const arc =
    (2 * Math.PI) /
    numberOfPrizes;

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  for (
    let i = 0;
    i < numberOfPrizes;
    i++
  ) {
    const start =
      i * arc + angleOffset;

    const end =
      start + arc;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(
      cx,
      cy,
      radius,
      start,
      end
    );
    ctx.closePath();

    ctx.fillStyle = colors[i];
    ctx.fill();

    ctx.save();

    ctx.translate(cx, cy);
    ctx.rotate(
      start + arc / 2
    );

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#000";

    const text = prizes[i];

    const maxWidth =
      Math.min(
        120,
        radius * arc * 0.7
      );

    const textRadius =
      radius - 48;

    let fontSize = 18;

    ctx.font =
      `bold ${fontSize}px Arial, 'Noto Sans SC', sans-serif`;

    while (
      ctx.measureText(text).width >
        maxWidth &&
      fontSize > 12
    ) {
      fontSize--;

      ctx.font =
        `bold ${fontSize}px Arial, 'Noto Sans SC', sans-serif`;
    }

    ctx.fillText(
      text,
      textRadius,
      0
    );

    ctx.restore();
  }
}

drawWheel();

spinBtn.addEventListener(
  "click",
  () => {
    if (spinning) {
      return;
    }

    if (totalChances() <= 0) {
      const message =
        "每14天可免费抽奖一次。订阅或分享可获得额外机会。\n" +
        "One free spin every 14 days. Subscribe or Share to get an extra chance.";

      if (
        isTG &&
        Telegram.WebApp.showAlert
      ) {
        Telegram.WebApp.showAlert(
          message
        );
      } else {
        alert(message);
      }

      return;
    }

    spinning = true;

    if (bonusSpins > 0) {
      bonusSpins--;
    } else {
      lastSpinAt = Date.now();
    }

    saveState();
    updateUI();

    const spinAngle =
      360 * 5 +
      Math.random() * 360;

    const duration = 4200;

    const startTime =
      performance.now();

    function step(now) {
      const progress =
        Math.min(
          (now - startTime) /
            duration,
          1
        );

      const ease =
        1 -
        Math.pow(
          1 - progress,
          3
        );

      drawWheel(
        ease *
        spinAngle *
        Math.PI /
        180
      );

      if (progress < 1) {
        requestAnimationFrame(step);
      } else {
        spinning = false;
        updateUI();
        onDone(spinAngle);
      }
    }

    requestAnimationFrame(step);
  }
);

function onDone(spinAngleDeg) {
  const numberOfPrizes =
    prizes.length;

  const raw =
    (spinAngleDeg % 360) /
    360;

  const index =
    (
      numberOfPrizes -
      1 -
      Math.floor(
        raw * numberOfPrizes
      )
    ) %
    numberOfPrizes;

  const result =
    prizes[index];

  /* 不显示弹窗，只把结果传回Bot */
  reportResult(result);
}

async function reportResult(result) {
  const tg = window.Telegram?.WebApp;

  if (!tg || !tg.initData) {
    console.error(
      "Telegram Mini App initData is unavailable."
    );
    return;
  }

  try {
    const response = await fetch(
      "https://pcatdolls-auto-channel-bot.onrender.com/wheel-result",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          initData: tg.initData,
          result: result
        })
      }
    );

    const responseText = await response.text();
    let responseData;

    try {
      responseData = JSON.parse(responseText);
    } catch (error) {
      throw new Error(
        "Render returned an invalid response."
      );
    }

    if (!response.ok || !responseData.ok) {
      throw new Error(
        responseData.error ||
        "Result sending failed."
      );
    }

    console.log(
      "Wheel result sent successfully:",
      result
    );

    setTimeout(() => {
      tg.close();
    }, 700);
  } catch (error) {
    console.error(
      "Wheel result sending failed:",
      error
    );
  }
}

document
  .getElementById("subBtn")
  .addEventListener(
    "click",
    () => {
      if (isTG) {
        Telegram.WebApp
          .openTelegramLink(
            "https://t.me/pcatdolls"
          );
      } else {
        window.open(
          "https://t.me/pcatdolls",
          "_blank"
        );
      }

      bonusSpins++;
      saveState();
      updateUI();
    }
  );

document
  .getElementById("shareBtn")
  .addEventListener(
    "click",
    () => {
      const shareUrl =
        "https://t.me/share/url" +
        "?url=" +
        encodeURIComponent(
          "https://t.me/pcatdolls"
        ) +
        "&text=" +
        encodeURIComponent(
          "PCD Lucky Wheel"
        );

      if (isTG) {
        Telegram.WebApp
          .openTelegramLink(
            shareUrl
          );
      } else {
        window.open(
          shareUrl,
          "_blank"
        );
      }

      bonusSpins++;
      saveState();
      updateUI();
    }
  );
</script>

</body>
</html>
